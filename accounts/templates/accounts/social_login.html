{% load socialaccount %}
<!DOCTYPE html>
<html>
<head>
    <title>Google Login</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; text-align: center; }
        .container { max-width: 400px; margin: 0 auto; }
        .google-btn {
            display: inline-flex;
            align-items: center;
            background-color: #4285f4;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            margin: 10px;
        }
        .google-btn:hover {
            background-color: #357ae8;
        }
        .google-icon {
            width: 18px;
            height: 18px;
            margin-right: 8px;
        }
        .back-link { margin-top: 20px; }
        .back-link a { color: #007cba; text-decoration: none; }
        .back-link a:hover { text-decoration: underline; }
        .success { color: #28a745; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Login with Google</h2>
        
        <div class="success">
            ✅ Google OAuth is configured and ready to use!
        </div>
        
        <a href="{% provider_login_url 'google' process='login' %}" class="google-btn">
            <svg class="google-icon" viewBox="0 0 24 24">
                <path fill="#ffffff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#ffffff" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#ffffff" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#ffffff" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continue with Google
        </a>
        
        <div class="back-link">
            <a href="{% url 'accounts:login' %}">← Back to regular login</a>
        </div>
    </div>
</body>
</html>
