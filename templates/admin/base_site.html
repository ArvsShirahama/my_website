{% extends "admin/base_site.html" %}
{% load static %}

{% block extrastyle %}
{{ block.super }}
<style>
    /* Modern Admin Styles */
    :root {
        --primary-color: #4f46e5;
        --primary-hover: #4338ca;
        --secondary-color: #64748b;
        --success-color: #10b981;
        --danger-color: #ef4444;
        --warning-color: #f59e0b;
        --background: #f8fafc;
        --surface: #ffffff;
        --text-primary: #1e293b;
        --text-secondary: #64748b;
        --border-color: #e2e8f0;
        --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        --radius: 0.5rem;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background: var(--background);
        color: var(--text-primary);
        line-height: 1.6;
    }

    #header {
        background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-hover) 100%);
        box-shadow: var(--shadow-md);
        border-bottom: none;
    }

    #header .branding {
        display: flex;
        align-items: center;
        padding: 1rem 2rem;
    }

    #header .branding a {
        color: white;
        font-size: 1.5rem;
        font-weight: 700;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 0.75rem;
    }

    #header .branding a:hover {
        color: rgba(255, 255, 255, 0.9);
    }

    #header .branding h1 {
        margin: 0;
        font-size: 1.5rem;
        font-weight: 700;
    }

    #user-tools {
        padding: 1rem 2rem;
        display: flex;
        align-items: center;
        gap: 1rem;
    }

    #user-tools a {
        color: rgba(255, 255, 255, 0.9);
        text-decoration: none;
        padding: 0.5rem 1rem;
        border-radius: var(--radius);
        transition: all 0.2s;
        font-weight: 500;
    }

    #user-tools a:hover {
        background: rgba(255, 255, 255, 0.1);
        color: white;
    }

    .module {
        background: var(--surface);
        border: 1px solid var(--border-color);
        border-radius: var(--radius);
        box-shadow: var(--shadow-sm);
        margin-bottom: 2rem;
        overflow: hidden;
        transition: all 0.2s;
    }

    .module:hover {
        box-shadow: var(--shadow-md);
        transform: translateY(-2px);
    }

    .module h2, .module caption {
        background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
        color: var(--text-primary);
        padding: 1rem 1.5rem;
        margin: 0;
        font-weight: 600;
        border-bottom: 1px solid var(--border-color);
    }

    .module h2 a, .module caption a {
        color: var(--text-primary);
        text-decoration: none;
    }

    .module h2 a:hover, .module caption a:hover {
        color: var(--primary-color);
    }

    .module ul {
        padding: 1rem 1.5rem;
        margin: 0;
    }

    .module ul li {
        margin-bottom: 0.5rem;
    }

    .module ul li a {
        color: var(--text-primary);
        text-decoration: none;
        padding: 0.5rem 0;
        display: block;
        border-radius: 0.25rem;
        transition: all 0.2s;
    }

    .module ul li a:hover {
        color: var(--primary-color);
        background: rgba(79, 70, 229, 0.1);
        padding-left: 0.75rem;
    }

    .addlink, .changelink {
        background: var(--primary-color);
        color: white;
        padding: 0.5rem 1rem;
        border-radius: var(--radius);
        text-decoration: none;
        font-weight: 500;
        transition: all 0.2s;
        display: inline-block;
        margin: 0.25rem;
    }

    .addlink:hover, .changelink:hover {
        background: var(--primary-hover);
        transform: translateY(-1px);
        box-shadow: var(--shadow-md);
    }

    .object-tools a {
        background: var(--primary-color);
        color: white;
        padding: 0.5rem 1rem;
        border-radius: var(--radius);
        text-decoration: none;
        font-weight: 500;
        transition: all 0.2s;
    }

    .object-tools a:hover {
        background: var(--primary-hover);
        transform: translateY(-1px);
    }

    .button, input[type=submit], input[type=button], .submit-row input {
        background: var(--primary-color);
        color: white;
        border: none;
        padding: 0.75rem 1.5rem;
        border-radius: var(--radius);
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
        text-decoration: none;
        display: inline-block;
    }

    .button:hover, input[type=submit]:hover, input[type=button]:hover, .submit-row input:hover {
        background: var(--primary-hover);
        transform: translateY(-1px);
        box-shadow: var(--shadow-md);
    }

    .default, .button.default {
        background: var(--success-color);
    }

    .default:hover, .button.default:hover {
        background: #059669;
    }

    .deletelink {
        background: var(--danger-color);
        color: white;
        padding: 0.5rem 1rem;
        border-radius: var(--radius);
        text-decoration: none;
        font-weight: 500;
        transition: all 0.2s;
    }

    .deletelink:hover {
        background: #dc2626;
        transform: translateY(-1px);
    }

    .form-row {
        border-bottom: 1px solid var(--border-color);
        padding: 1rem 0;
    }

    .form-row:last-child {
        border-bottom: none;
    }

    .form-row label {
        color: var(--text-secondary);
        font-weight: 600;
        margin-bottom: 0.5rem;
    }

    input, select, textarea {
        border: 1px solid var(--border-color);
        border-radius: var(--radius);
        padding: 0.75rem;
        background: var(--surface);
        transition: all 0.2s;
    }

    input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    .paginator {
        background: var(--surface);
        border: 1px solid var(--border-color);
        border-radius: var(--radius);
        padding: 1rem;
        margin-top: 1rem;
    }

    .paginator a {
        color: var(--primary-color);
        text-decoration: none;
        padding: 0.5rem 0.75rem;
        border-radius: 0.25rem;
        transition: all 0.2s;
    }

    .paginator a:hover {
        background: rgba(79, 70, 229, 0.1);
    }

    .paginator .this-page {
        background: var(--primary-color);
        color: white;
        padding: 0.5rem 0.75rem;
        border-radius: 0.25rem;
    }

    #content {
        padding: 2rem;
    }

    .breadcrumbs {
        background: var(--surface);
        border: 1px solid var(--border-color);
        border-radius: var(--radius);
        padding: 1rem 1.5rem;
        margin-bottom: 2rem;
    }

    .breadcrumbs a {
        color: var(--primary-color);
        text-decoration: none;
    }

    .breadcrumbs a:hover {
        text-decoration: underline;
    }

    .messagelist {
        background: var(--surface);
        border: 1px solid var(--border-color);
        border-radius: var(--radius);
        padding: 1rem;
        margin-bottom: 2rem;
    }

    .messagelist .success {
        background: rgba(16, 185, 129, 0.1);
        color: var(--success-color);
        padding: 0.75rem 1rem;
        border-radius: var(--radius);
        border-left: 4px solid var(--success-color);
    }

    .messagelist .warning {
        background: rgba(245, 158, 11, 0.1);
        color: var(--warning-color);
        padding: 0.75rem 1rem;
        border-radius: var(--radius);
        border-left: 4px solid var(--warning-color);
    }

    .messagelist .error {
        background: rgba(239, 68, 68, 0.1);
        color: var(--danger-color);
        padding: 0.75rem 1rem;
        border-radius: var(--radius);
        border-left: 4px solid var(--danger-color);
    }

    /* Responsive Design */
    @media (max-width: 768px) {
        #header .branding {
            padding: 1rem;
        }
        
        #user-tools {
            padding: 1rem;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        #content {
            padding: 1rem;
        }
        
        .module {
            margin-bottom: 1rem;
        }
    }

    /* Dark mode support */
    @media (prefers-color-scheme: dark) {
        :root {
            --background: #0f172a;
            --surface: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #334155;
        }
    }
</style>
{% endblock %}

{% block branding %}
<h1 id="site-name">
    <a href="{% url 'admin:index' %}">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor" style="margin-right: 0.5rem;">
            <path d="M12 2L2 7v10c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-10-5z"/>
        </svg>
        Django Admin
    </a>
</h1>
{% endblock %}
