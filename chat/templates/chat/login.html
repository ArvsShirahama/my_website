{% extends 'chat/base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
    <div class="card" style="width: 100%; max-width: 420px; padding: 32px;">
        <div style="text-align: center; margin-bottom: 32px;">
            <div style="width: 64px; height: 64px; border-radius: 20px; background: linear-gradient(135deg, var(--primary), var(--accent)); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 28px;">&#128172;</div>
            <h1 style="font-size: 24px; font-weight: 700; margin-bottom: 4px;">Welcome Back</h1>
            <p style="color: var(--text-secondary); font-size: 14px;">Sign in to continue chatting</p>
        </div>
        
        {% if error %}
        <div style="background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: var(--error); padding: 12px 16px; border-radius: var(--radius-sm); margin-bottom: 20px; font-size: 14px;">
            {{ error }}
        </div>
        {% endif %}
        
        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div style="margin-bottom: 16px;">
                <label style="display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;">Username</label>
                <input type="text" name="username" placeholder="Enter username" required autofocus>
            </div>
            <div style="margin-bottom: 24px;">
                <label style="display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;">Password</label>
                <input type="password" name="password" placeholder="Enter password" required>
            </div>
            <button type="submit" style="width: 100%; padding: 14px; font-size: 15px; font-weight: 600; margin-bottom: 16px;">Sign In</button>
        </form>
        
        <div style="position: relative; text-align: center; margin-bottom: 24px;">
            <div style="position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: var(--border);"></div>
            <span style="position: relative; background: var(--surface); padding: 0 12px; font-size: 13px; color: var(--text-muted);">or continue with</span>
        </div>
        
        <a href="/accounts/google/login/?next=/chat/" style="display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 14px; font-weight: 500; text-decoration: none; transition: background 0.2s ease; margin-bottom: 16px;">
            <svg width="18" height="18" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Google
        </a>
        
        <div style="text-align: center; font-size: 14px; color: var(--text-secondary);">
            Don't have an account? 
            <a href="{% url 'register' %}" style="color: var(--primary); font-weight: 600;">Create Account</a>
        </div>
    </div>
</div>
{% endblock %}
