services:
  # Web Service
  - type: web
    name: django-google-oauth
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "python manage.py migrate --noinput && (python manage.py createsuperuser --noinput || true) && gunicorn myproject.wsgi:application"
    envVars:
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      # DATABASE_URL is set manually in the Render dashboard
      # (Environment tab) using the Internal Database URL from
      # the PostgreSQL database created in Render.
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      - key: ALLOWED_HOSTS
        value: my-website-4jgk.onrender.com
