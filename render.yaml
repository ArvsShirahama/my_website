services:
  # Web Service
  - type: web
    name: django-google-oauth
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn myproject.wsgi:application
    envVars:
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: django-db
          property: connectionString
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false

  # PostgreSQL Database
  - type: pserv
    name: django-db
    plan: free
    env: docker
    databaseName: django_oauth_db
    user: django_user
